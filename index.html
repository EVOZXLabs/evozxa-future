<!DOCTYPE html>
<html lang="en" class="bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOZXA FUTURE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
</head>

<body class="text-slate-200 antialiased pb-20">

<div id="app" class="max-w-3xl mx-auto p-4 md:p-6 space-y-6">

    <header class="flex justify-between items-center py-4 border-b border-slate-800">
        <div class="flex items-center gap-3">
            <img src="./images/logo.png" alt="Logo" class="w-8 h-8">
            <span class="font-bold text-xl tracking-tight text-white">EVOZXA FUTURE</span>
        </div>
        <button id="connectBtn" class="px-5 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-full text-sm font-semibold transition">
            Connect Wallet
        </button>
    </header>

    <section class="text-center py-6">
        <h1 class="text-3xl font-bold text-white mb-2">Create Professional Tokens</h1>
        <p class="text-slate-400">Deploy, Verify and Manage smart contracts directly on EVOZ Mainnet.</p>
        
        <div id="walletInfo" class="grid grid-cols-3 gap-2 mt-6 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
            <div><p class="text-xs text-slate-500">Wallet</p><strong id="walletAddress" class="text-sm block truncate">Not Connected</strong></div>
            <div><p class="text-xs text-slate-500">EVOZ</p><strong id="evozBalance" class="text-sm">0.00</strong></div>
            <div><p class="text-xs text-slate-500">EVOZX</p><strong id="evozxBalance" class="text-sm">0.00</strong></div>
        </div>
    </section>

    <form id="tokenForm" class="space-y-6">
        <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-lg font-semibold mb-4 text-white">Token Configuration</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="name" type="text" placeholder="Token Name" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl focus:ring-2 focus:ring-yellow-500/50 outline-none transition">
                <input id="symbol" type="text" placeholder="Symbol" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl focus:ring-2 focus:ring-yellow-500/50 outline-none transition">
                <input id="supply" type="number" placeholder="Total Supply" class="md:col-span-2 bg-slate-950 border border-slate-800 p-3 rounded-xl focus:ring-2 focus:ring-yellow-500/50 outline-none transition">
            </div>
        </div>

        <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
            <h3 class="font-semibold mb-4 text-white">Features</h3>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-sm">
                <label class="flex items-center gap-2 cursor-pointer p-2 hover:bg-slate-800 rounded-lg"><input type="checkbox" id="burnable" class="accent-yellow-500"> Burnable</label>
                <label class="flex items-center gap-2 cursor-pointer p-2 hover:bg-slate-800 rounded-lg"><input type="checkbox" id="mintable" class="accent-yellow-500"> Mintable</label>
                <label class="flex items-center gap-2 cursor-pointer p-2 hover:bg-slate-800 rounded-lg"><input type="checkbox" id="ownership" class="accent-yellow-500"> Ownership</label>
                </div>
        </div>

        <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
            <h3 class="font-semibold mb-4 text-white">Metadata & Advanced</h3>
            <div class="space-y-4">
                <input id="websiteUrl" type="text" placeholder="Website URL" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500/50">
                </div>
        </div>
    </form>

    <section class="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-slate-800 p-4">
        <div class="max-w-3xl mx-auto flex items-center justify-between gap-4">
            <div class="text-sm">
                <p>Fee: <span id="evozxFee">10</span> EVOZX</p>
                <p class="font-bold">Total: <span id="evozFee">50</span> EVOZ</p>
            </div>
            <button id="deployBtn" class="px-8 py-3 bg-gradient-to-r from-yellow-600 to-amber-500 rounded-xl font-bold text-white shadow-lg shadow-yellow-500/20 hover:scale-[1.02] transition">
                Deploy Token
            </button>
        </div>
    </section>

</div>

<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/main.js"></script>

</body>
</html>
