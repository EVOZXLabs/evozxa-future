<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVOZXA FUTURE</title>

<link rel="stylesheet" href="./css/app.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Metamorphous&family=Plus+Jakarta+Sans:wght@400;600&display=swap');

  :root {
    --bg-arcane: #090514;
    --bg-void: #120c24;
    --bg-scroll: #1c1435;
    --color-mana: #8a2be2;
    --color-fire: #ff4500;
    --color-gold: #ffd700;
    --color-text: #e0d5f5;
    --glow-mana: 0 0 12px #8a2be2;
    --glow-gold: 0 0 10px rgba(255, 215, 0, 0.4);
    --border-mystic: 1px solid rgba(138, 43, 226, 0.3);
  }

  body {
    background-color: var(--bg-arcane);
    background-image: 
      radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0, 191, 255, 0.1) 0%, transparent 40%);
    color: var(--color-text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    padding: 0;
  }

  /* Typography Wizardry */
  h1, h2, h3, .brand span {
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
    text-shadow: var(--glow-gold);
    color: var(--color-gold);
  }

  /* Topbar / Navegasi */
  .topbar {
    background: rgba(18, 12, 36, 0.85);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid var(--color-mana);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .brand img {
    filter: drop-shadow(var(--glow-mana));
    max-height: 40px;
  }

  /* Buttons & Rituals */
  button {
    font-family: 'Metamorphous', cursive;
    background: linear-gradient(135deg, #4a154b, var(--color-mana));
    color: #fff;
    border: 1px solid var(--color-gold);
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: var(--glow-mana);
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px #bf55ec, var(--glow-gold);
    color: var(--color-gold);
  }

  #deployBtn {
    background: linear-gradient(135deg, #8a2be2, #41006f);
    width: 100%;
    font-size: 1.1rem;
    margin-top: 20px;
    border: 2px solid var(--color-gold);
  }

  /* Container & Hero */
  .container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .hero {
    text-align: center;
    margin-bottom: 50px;
    background: rgba(28, 20, 53, 0.4);
    padding: 40px;
    border-radius: 16px;
    border: var(--border-mystic);
    box-shadow: inset 0 0 30px rgba(138, 43, 226, 0.2);
  }

  .hero h1 {
    font-size: 2.8rem;
    margin-bottom: 10px;
    background: linear-gradient(to right, var(--color-gold), #fff, var(--color-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    color: #b0a2cd;
    font-style: italic;
  }

  /* Wallet Info Chamber */
  .wallet-info {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .wallet-item {
    background: var(--bg-void);
    border: 1px solid rgba(255, 215, 0, 0.2);
    padding: 15px 25px;
    border-radius: 10px;
    min-width: 150px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .wallet-item span {
    display: block;
    font-size: 0.8rem;
    color: #8b859e;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .wallet-item strong {
    color: var(--color-text);
    font-family: monospace;
    font-size: 1.1rem;
  }

  #walletAddress {
    color: #00bef5;
    text-shadow: 0 0 5px rgba(0, 191, 255, 0.5);
  }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 30px;
  }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* Card Grimoire / Scroll */
  .card {
    background: var(--bg-scroll);
    border: var(--border-mystic);
    border-top: 4px solid var(--color-mana);
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, var(--color-gold), transparent);
  }

  .card h2 {
    border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    padding-bottom: 10px;
    margin-top: 0;
  }

  /* Inputs / Runes Registration */
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    background: var(--bg-void);
    border: 1px solid rgba(138, 43, 226, 0.4);
    border-radius: 6px;
    color: #fff;
    box-sizing: border-box;
    transition: all 0.3s;
  }

  input[type="text"]:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--color-gold);
    box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    background: #181030;
  }

  /* Checkboxes / Sigils */
  .features-box {
    background: rgba(18, 12, 36, 0.5);
    padding: 20px;
    border-radius: 8px;
    border: 1px dashed rgba(138, 43, 226, 0.4);
    margin-bottom: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }

  .features-box h3, .advanced-box h3 {
    grid-column: 1 / -1;
    margin-top: 0;
    color: #b0a2cd;
    font-size: 1.1rem;
  }

  .features-box label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    color: #c3b9d9;
    user-select: none;
  }

  .features-box input[type="checkbox"] {
    accent-color: var(--color-mana);
    transform: scale(1.2);
    cursor: pointer;
  }

  .section-space {
    margin-top: 25px !important;
  }

  /* Deployment Summary */
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px dashed rgba(255, 215, 0, 0.1);
  }

  .summary-row span {
    color: #b0a2cd;
  }

  .summary-row strong {
    color: var(--color-gold);
    font-family: monospace;
    font-size: 1.2rem;
    text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
  }
</style>
</head>

<body>

<div id="app">

<header class="topbar">

<div class="brand">
<img src="./images/logo.png" alt="EVOZXA">
<span>EVOZXA FUTURE</span>
</div>

<button id="connectBtn">
Connect Wallet
</button>

</header>

<main class="container">

<section class="hero">

<h1>Launch Professional Tokens On EVOZ</h1>

<p>
Deploy, Verify and Manage smart contracts directly
on EVOZ Mainnet.
</p>

<div id="walletInfo" class="wallet-info">

<div class="wallet-item">
<span>Wallet</span>
<strong id="walletAddress">Not Connected</strong>
</div>

<div class="wallet-item">
<span>EVOZ</span>
<strong id="evozBalance">0.00</strong>
</div>

<div class="wallet-item">
<span>EVOZX</span>
<strong id="evozxBalance">0.00</strong>
</div>

</div>
  
</section>

<div class="grid">

<section class="card">

<h2>Token Configuration</h2>

<form id="tokenForm">

<input
id="name"
type="text"
placeholder="Token Name"
/>

<input
id="symbol"
type="text"
placeholder="Symbol"
/>

<input
id="supply"
type="number"
placeholder="Total Supply"
/>

<div class="features-box">

<h3>Features</h3>

<label>
<input type="checkbox" id="burnable">
Burnable
</label>

<label>
<input type="checkbox" id="mintable">
Mintable
</label>

<label>
<input type="checkbox" id="ownership">
Ownership
</label>

<label>
<input type="checkbox" id="maxWallet">
Max Wallet
</label>

<label>
<input type="checkbox" id="maxTx">
Max TX
</label>

<label>
<input type="checkbox" id="tradingControl">
Trading Control
</label>

<label>
<input type="checkbox" id="buyTax">
Buy Tax
</label>

<label>
<input type="checkbox" id="sellTax">
Sell Tax
</label>

<label>
<input type="checkbox" id="website">
Website
</label>

<label>
<input type="checkbox" id="telegram">
Telegram
</label>

<label>
<input type="checkbox" id="twitter">
Twitter
</label>

<label>
<input type="checkbox" id="logo">
Logo
</label>

</div>

<div class="advanced-box">

<h3>Metadata</h3>

<input
id="websiteUrl"
type="text"
placeholder="Website URL"
/>

<input
id="telegramUrl"
type="text"
placeholder="Telegram URL"
/>

<input
id="twitterUrl"
type="text"
placeholder="Twitter URL"
/>

<input
id="logoUrl"
type="text"
placeholder="Logo URL"
/>

<h3 class="section-space">
Advanced Settings
</h3>

<input
id="buyTaxValue"
type="number"
placeholder="Buy Tax %"
/>

<input
id="sellTaxValue"
type="number"
placeholder="Sell Tax %"
/>

<input
id="maxWalletValue"
type="number"
placeholder="Max Wallet %"
/>

<input
id="maxTxValue"
type="number"
placeholder="Max TX %"
/>

<input
id="burnTaxShare"
type="number"
placeholder="Burn Tax Share %"
/>

<input
id="marketingWallet"
type="text"
placeholder="Marketing Wallet"
/>

<input
id="developmentWallet"
type="text"
placeholder="Development Wallet"
/>

</div>

</form>

</section>

<section class="card">

<h2>Deployment Summary</h2>

<div id="summary">

<div class="summary-row">
<span>Total EVOZX Fee</span>
<strong id="evozxFee">10</strong>
</div>

<div class="summary-row">
<span>Total EVOZ Value</span>
<strong id="evozFee">50</strong>
</div>

</div>

<button id="deployBtn">
Deploy Token
</button>

</section>

</div>

</main>

</div>

<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/main.js"></script>

</body>
</html>
