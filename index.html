<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOZXA FUTURE</title>
    <link rel="stylesheet" href="./css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
</head>
<body>

<div class="saas-container">
    <!-- Header -->
    <div class="brand-header">
        <img src="./images/logo.png" class="platform-logo" alt="EVOZXA">
        <h2>EVOZXA FUTURE</h2>
        <p>Professional Token Deployment on EVOZ</p>
    </div>

    <!-- Wallet Info Section -->
    <div id="walletInfo" class="wallet-info">
        <div class="wallet-item"><span>Wallet</span><strong id="walletAddress">Not Connected</strong></div>
        <div class="wallet-item"><span>EVOZ</span><strong id="evozBalance">0.00</strong></div>
        <div class="wallet-item"><span>EVOZX</span><strong id="evozxBalance">0.00</strong></div>
    </div>

    <form id="tokenForm" style="margin-top: 20px;">
        <div class="input-group">
            <label>Token Name</label>
            <input id="name" type="text" placeholder="e.g. My Token" />
        </div>
        <div class="input-group">
            <label>Symbol</label>
            <input id="symbol" type="text" placeholder="e.g. MTK" />
        </div>
        <div class="input-group">
            <label>Total Supply</label>
            <input id="supply" type="number" placeholder="1000000" />
        </div>

        <!-- Accordion Container -->
        <div class="accordion-container">
            <!-- Features Accordion -->
            <div class="accordion-item">
                <div class="accordion-header">Features <span class="arrow-icon">▶</span></div>
                <div class="accordion-content">
                    <label class="checkbox-group"><input type="checkbox" id="burnable" class="feature-checkbox"> <span class="checkbox-text"><span class="feat-name">Burnable</span></span></label>
                    <label class="checkbox-group"><input type="checkbox" id="mintable" class="feature-checkbox"> <span class="checkbox-text"><span class="feat-name">Mintable</span></span></label>
                    <label class="checkbox-group"><input type="checkbox" id="ownership" class="feature-checkbox"> <span class="checkbox-text"><span class="feat-name">Ownership</span></span></label>
                    <!-- ... tambahkan checkbox lainnya dengan struktur yang sama ... -->
                </div>
            </div>

            <!-- Metadata Accordion -->
            <div class="accordion-item">
                <div class="accordion-header">Metadata <span class="arrow-icon">▶</span></div>
                <div class="accordion-content">
                    <input id="websiteUrl" type="text" placeholder="Website URL" style="margin-bottom: 10px;">
                    <input id="telegramUrl" type="text" placeholder="Telegram URL" style="margin-bottom: 10px;">
                </div>
            </div>

            <!-- Advanced Settings Accordion -->
            <div class="accordion-item">
                <div class="accordion-header">Advanced Settings <span class="arrow-icon">▶</span></div>
                <div class="accordion-content">
                    <input id="buyTaxValue" type="number" placeholder="Buy Tax %" style="margin-bottom: 10px;">
                    <input id="sellTaxValue" type="number" placeholder="Sell Tax %" style="margin-bottom: 10px;">
                </div>
            </div>
        </div>
    </form>

    <!-- Price Summary -->
    <div class="price-panel">
        <div class="price-row"><span>EVOZX Fee</span> <span class="price-glowing" id="evozxFee">10</span></div>
        <div class="price-row" style="margin-top: 8px;"><span>EVOZ Value</span> <span class="price-glowing" id="evozFee">50</span></div>
    </div>

    <button id="deployBtn" class="premium-btn">Deploy Token</button>
</div>

<!-- Script untuk Accordion -->
<script>
    document.querySelectorAll('.accordion-header').forEach(header => {
        header.addEventListener('click', () => {
            header.parentElement.classList.toggle('active');
        });
    });
</script>
<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/main.js"></script>
</body>
</html>
